<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-1:#0d1117;
  --bg-2:#1a1410;
  --ink:#ede4d3;
  --ink-soft:#c5b8a0;
  --ink-mute:#8a7f6e;
  --ink-faint:#5c5448;
  --pine:#d4a373;
  --pine-glow:#f4d29c;
  --moss:#7a8c5c;
  --line:rgba(237,228,211,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Serif SC','Cormorant Garamond',serif;
  background:var(--bg-1);
  color:var(--ink);
  overflow-x:hidden;
  line-height:1.95;
  min-height:100vh;
  position:relative;
}
#stardust{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.bg-glow{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,163,115,.08),transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 80%,rgba(122,140,92,.05),transparent 60%),
    radial-gradient(ellipse 60% 40% at 15% 60%,rgba(212,163,115,.05),transparent 60%);
}
.corner-mark{
  position:fixed;top:24px;left:28px;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--ink-faint);font-size:.82rem;letter-spacing:.3em;
  z-index:10;opacity:.55;
}
.corner-mark .dot{color:var(--pine);}

/* ====== HERO ====== */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;position:relative;
  padding:80px 24px;
}
.pine-icon{
  width:28px;height:42px;
  animation:pine-drop 3.4s cubic-bezier(.4,0,.6,1) infinite;
  margin-bottom:42px;
}
@keyframes pine-drop{
  0%{transform:translateY(-50px) rotate(0);opacity:0}
  20%{opacity:1}
  70%{transform:translateY(10px) rotate(160deg);opacity:1}
  100%{transform:translateY(20px) rotate(220deg);opacity:0}
}
.hero .to{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(.95rem,1.6vw,1.15rem);
  color:var(--ink-mute);letter-spacing:.4em;margin-bottom:20px;
  text-indent:.4em;
}
.hero h1{
  font-family:'Noto Serif SC',serif;font-weight:500;
  font-size:clamp(3rem,8vw,5.8rem);
  letter-spacing:.5em;color:var(--ink);
  margin-bottom:28px;text-indent:.5em;
  text-shadow:0 0 40px rgba(212,163,115,.15);
}
.hero .sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(.85rem,1.3vw,1rem);
  color:var(--pine);letter-spacing:.45em;
}
.hero .scroll-hint{
  position:absolute;bottom:42px;left:50%;
  transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.78rem;color:var(--ink-faint);
  letter-spacing:.5em;
  animation:bob 2.6s ease-in-out infinite;
}
.hero .scroll-hint::after{
  content:'';display:block;width:1px;height:30px;
  background:linear-gradient(to bottom,var(--ink-faint),transparent);
  margin:14px auto 0;
}
@keyframes bob{
  0%,100%{opacity:.4}
  50%{opacity:1}
}

/* ====== MAIN ====== */
.container{
  position:relative;z-index:2;
  max-width:760px;margin:0 auto;padding:0 28px;
}
section{padding:110px 0;position:relative}
.section-label{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:.82rem;color:var(--pine);
  letter-spacing:.5em;margin-bottom:28px;
  text-transform:lowercase;
}
.section-label.center{text-align:center}
.paragraph{
  font-size:clamp(1.02rem,1.5vw,1.18rem);
  line-height:2.15;color:var(--ink-soft);
  letter-spacing:.02em;text-align:justify;
}
.paragraph .em{color:var(--ink);font-weight:400}
.paragraph .warm{color:var(--pine)}
.paragraph .mute{color:var(--ink-mute);font-size:.95em}
.aside{
  font-size:.88rem;color:var(--ink-mute);
  font-style:italic;margin-top:18px;letter-spacing:.04em;
  line-height:1.9;
}

/* ====== Reveal Animation ====== */
.reveal{
  opacity:0;transform:translateY(28px);
  transition:opacity 1.2s ease-out,transform 1.2s ease-out;
}
.reveal.in{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.18s}
.reveal-delay-2{transition-delay:.36s}
.reveal-delay-3{transition-delay:.54s}
.reveal-delay-4{transition-delay:.72s}

/* ====== Pine & Rock SVG ====== */
.pine-rock{
  display:grid;grid-template-columns:1fr;gap:48px;align-items:center;
}
@media(min-width:768px){
  .pine-rock{grid-template-columns:1.1fr .9fr;gap:72px}
}
.pine-svg-wrap{
  position:relative;aspect-ratio:4/5;
  max-width:340px;margin:0 auto;width:100%;
}

/* ====== Scenes ====== */
.scenes{display:grid;gap:10px;margin:36px 0}
.scene{
  padding:16px 22px;border-left:1px solid var(--line);
  font-family:'Cormorant Garamond','Noto Serif SC',serif;
  font-style:italic;font-size:1.05rem;color:var(--ink-soft);
  transition:all .5s ease;cursor:default;
  letter-spacing:.04em;
}
.scene:hover{
  border-left-color:var(--pine);
  color:var(--ink);transform:translateX(10px);
  background:rgba(212,163,115,.04);
}
.scene .num{
  font-family:'Cormorant Garamond',serif;color:var(--pine);
  margin-right:14px;font-size:.82rem;letter-spacing:.2em;
}

/* ====== Big Line ====== */
.big-line{
  font-family:'Noto Serif SC',serif;font-weight:300;
  font-size:clamp(1.8rem,4vw,2.6rem);line-height:1.7;
  color:var(--ink);text-align:center;
  letter-spacing:.08em;margin:50px 0;
}
.big-line .warm{color:var(--pine)}

/* ====== Island ====== */
.island{text-align:center;padding:30px 0}
.island-url{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--pine);letter-spacing:.15em;font-size:1rem;
  margin:30px 0 0;padding:14px 28px;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  display:inline-block;
}
.island-url .pulse{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--pine);margin:0 12px;
  animation:pulse 2s ease-in-out infinite;vertical-align:middle;
}
@keyframes pulse{
  0%,100%{opacity:.3;transform:scale(.8)}
  50%{opacity:1;transform:scale(1.2)}
}

/* ====== Promise ====== */
.promise{text-align:center;padding:60px 0 40px}
.half{
  font-family:'Noto Serif SC',serif;font-weight:300;
  font-size:clamp(2.2rem,5.5vw,3.6rem);color:var(--ink);
  letter-spacing:.2em;margin:30px 0 36px;
  position:relative;display:flex;align-items:center;justify-content:center;
}
.half::before,.half::after{
  content:'';display:inline-block;width:50px;height:1px;
  background:var(--pine);opacity:.5;margin:0 22px;
}
.half-note{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--pine);font-size:.95rem;letter-spacing:.2em;
  margin-bottom:8px;
}
.heartbeat-cta{
  display:inline-flex;align-items:center;gap:14px;
  margin-top:30px;padding:14px 32px;background:transparent;
  border:1px solid var(--pine);color:var(--pine);
  font-family:'Noto Serif SC',serif;font-size:.95rem;
  letter-spacing:.3em;cursor:pointer;
  transition:all .4s ease;border-radius:2px;
}
.heartbeat-cta:hover{
  background:var(--pine);color:var(--bg-1);
  box-shadow:0 0 30px rgba(212,163,115,.3);
}
.heartbeat-cta.beat{animation:heartbeat .65s ease}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}
  25%{transform:scale(1.06)}
  50%{transform:scale(.98)}
  75%{transform:scale(1.03)}
}
.whisper{
  margin-top:28px;font-family:'Cormorant Garamond',serif;
  font-style:italic;color:var(--pine-glow);font-size:1.02rem;
  opacity:0;transition:opacity 1s ease;letter-spacing:.1em;
  max-height:0;overflow:hidden;
}
.whisper.show{opacity:1;max-height:100px;margin-top:28px}

/* ====== Music Egg ====== */
.music-egg{
  display:inline-block;position:relative;cursor:pointer;
  color:var(--pine);border-bottom:1px dashed var(--pine);
  padding:0 6px;transition:color .3s;
}
.music-egg:hover{color:var(--pine-glow)}
.music-egg:hover::after{
  content:'♪ 仅你可见';
  position:absolute;bottom:130%;left:50%;
  transform:translateX(-50%);font-size:.72rem;
  color:var(--pine-glow);background:rgba(13,17,23,.95);
  padding:8px 14px;border-radius:4px;white-space:nowrap;
  margin-bottom:6px;letter-spacing:.15em;
  border:1px solid var(--line);
  font-family:'Cormorant Garamond','Noto Serif SC',serif;
  font-style:italic;
}

/* ====== Signature ====== */
.signature{text-align:right;padding:90px 0 70px}
.signature .from{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--ink-mute);font-size:.88rem;
  letter-spacing:.3em;margin-bottom:14px;
}
.signature .name{
  font-family:'Noto Serif SC',serif;font-weight:500;
  font-size:2.2rem;color:var(--ink);letter-spacing:.5em;
  display:inline-flex;align-items:center;
}
.signature .pine-mark{
  display:inline-block;width:22px;height:30px;
  margin-left:14px;opacity:.7;
}

/* ====== Mobile ====== */
@media(max-width:640px){
  section{padding:80px 0}
  .pine-rock{gap:40px}
  .signature{text-align:center}
  .signature .name{justify-content:center}
  .corner-mark{font-size:.7rem;top:18px;left:18px}
}

::selection{background:var(--pine);color:var(--bg-1)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-1)}
::-webkit-scrollbar-thumb{background:rgba(212,163,115,.4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--pine)}
</style>

<script>
/* ===== 星尘背景 ===== */
const canvas=document.getElementById('stardust');
const ctx=canvas.getContext('2d');
let stars=[],mx=0,my=0;
function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const count=Math.floor((canvas.width*canvas.height)/8500);
  stars=Array.from({length:count},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.3+.2,
    a:Math.random()*.5+.1,
    s:Math.random()*.4+.05,
    ph:Math.random()*Math.PI*2,
    drift:Math.random()*2-1
  }));
}
window.addEventListener('resize',resize);
resize();
function drawStars(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    const flicker=.5+.5*Math.sin(t*.001*s.s+s.ph);
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(244,228,193,${s.a*flicker})`;
    ctx.fill();
    s.y-=s.s*.15;
    s.x+=Math.sin(t*.0003+s.ph)*.08;
    if(s.y<-5){s.y=canvas.height+5;s.x=Math.random()*canvas.width}
    if(s.x<-5)s.x=canvas.width+5;
    if(s.x>canvas.width+5)s.x=-5;
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

/* ===== 滚动入场 ===== */
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('in');
    }
  });
},{threshold:.15,rootMargin:'0px 0px -60px 0px'});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

/* ===== 心跳按钮 ===== */
const btn=document.getElementById('heartbeatBtn');
const whisper=document.getElementById('whisper');
let beatCount=0;
btn.addEventListener('click',()=>{
  btn.classList.add('beat');
  whisper.classList.add('show');
  beatCount++;
  if(beatCount>=3){
    btn.querySelector('span').textContent='已 留 好 几 个 心 跳 给 你';
  }
  setTimeout(()=>btn.classList.remove('beat'),650);
});

/* ===== 点击飘落松子彩蛋 ===== */
function spawnPine(x,y){
  const pine=document.createElement('div');
  const rot=(Math.random()-.5)*720;
  const dx=(Math.random()-.5)*120;
  const dy=window.innerHeight-y+80;
  pine.style.cssText=`
    position:fixed;left:${x-4}px;top:${y-6}px;
    width:8px;height:14px;
    background:linear-gradient(to bottom,#d4a373,#a07d52);
    border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    pointer-events:none;z-index:9999;opacity:.9;
    transition:transform 2.2s cubic-bezier(.4,0,.6,1),opacity 2.2s ease-out;
    box-shadow:0 0 8px rgba(212,163,115,.4);
  `;
  document.body.appendChild(pine);
  requestAnimationFrame(()=>{
    pine.style.transform=`translate(${dx}px,${dy}px) rotate(${rot}deg)`;
    pine.style.opacity='0';
  });
  setTimeout(()=>pine.remove(),2300);
}
document.addEventListener('click',e=>{
  if(e.target.closest('button')||e.target.closest('.music-egg')||e.target.closest('a'))return;
  spawnPine(e.clientX,e.clientY);
});

/* ===== 音乐彩蛋点击 ===== */
const egg=document.querySelector('.music-egg');
if(egg){
  egg.addEventListener('click',()=>{
    for(let i=0;i<5;i++){
      setTimeout(()=>{
        spawnPine(
          egg.getBoundingClientRect().left+Math.random()*egg.offsetWidth,
          egg.getBoundingClientRect().top+10
        );
      },i*150);
    }
  });
}

/* ===== 鼠标视差（轻微） ===== */
const glow=document.querySelector('.bg-glow');
document.addEventListener('mousemove',e=>{
  const x=(e.clientX/window.innerWidth-.5)*20;
  const y=(e.clientY/window.innerHeight-.5)*20;
  glow.style.transform=`translate(${x}px,${y}px)`;
});
</script>
</body>
</html>
